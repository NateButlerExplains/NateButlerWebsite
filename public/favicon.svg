<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shield -->
  <g id="shield">
    <!-- Bold shield outline — aggressive thickness -->
    <path d="M 100 20 L 170 55 L 170 120 C 170 165 100 185 100 185 C 100 185 30 165 30 120 L 30 55 Z"
          fill="none"
          stroke="#00e5ff"
          stroke-width="8"
          stroke-linejoin="round"
          stroke-linecap="round"/>

    <!-- Large checkmark — aggressive weight -->
    <g id="checkmark" transform="translate(100, 115)">
      <!-- Left part of checkmark -->
      <line x1="-28" y1="8" x2="-8" y2="35"
            stroke="#00e5ff"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <!-- Right part of checkmark -->
      <line x1="-8" y1="35" x2="32" y2="-20"
            stroke="#00e5ff"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Strong glow effect for extra pop -->
  <defs>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow layer behind main shield -->
  <g filter="url(#strongGlow)">
    <path d="M 100 20 L 170 55 L 170 120 C 170 165 100 185 100 185 C 100 185 30 165 30 120 L 30 55 Z"
          fill="none"
          stroke="#00e5ff"
          stroke-width="8"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.5"/>
  </g>
</svg>