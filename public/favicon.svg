<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shield -->
  <g id="shield">
    <!-- Bold shield outline — ultra aggressive thickness with dark outline -->
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#0a0a0f"
          stroke-width="12"
          stroke-linejoin="round"
          stroke-linecap="round"/>

    <!-- Cyan bright shield outline on top -->
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#00e5ff"
          stroke-width="8"
          stroke-linejoin="round"
          stroke-linecap="round"/>

    <!-- Large checkmark — ultra aggressive weight -->
    <g id="checkmark" transform="translate(100, 120)">
      <!-- Left part of checkmark -->
      <line x1="-32" y1="10" x2="-8" y2="40"
            stroke="#00e5ff"
            stroke-width="10"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <!-- Right part of checkmark -->
      <line x1="-8" y1="40" x2="38" y2="-18"
            stroke="#00e5ff"
            stroke-width="10"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Strong glow effect for extra pop -->
  <defs>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark glow layer behind main shield -->
  <g filter="url(#strongGlow)">
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#0a0a0f"
          stroke-width="12"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.6"/>
  </g>

  <!-- Cyan glow layer -->
  <g filter="url(#strongGlow)">
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#00e5ff"
          stroke-width="8"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.4"/>
  </g>
</svg>