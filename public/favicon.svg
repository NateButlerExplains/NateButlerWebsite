<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shield -->
  <g id="shield">
    <!-- Bold shield outline — ultra aggressive thickness with dark outline -->
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#0a0a0f"
          stroke-width="16"
          stroke-linejoin="round"
          stroke-linecap="round"/>

    <!-- Cyan bright shield outline on top -->
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#00e5ff"
          stroke-width="10"
          stroke-linejoin="round"
          stroke-linecap="round"/>

    <!-- Large checkmark — ultra aggressive weight, centered -->
    <g id="checkmark" transform="translate(100, 110)">
      <!-- Left part of checkmark -->
      <line x1="-28" y1="8" x2="-6" y2="35"
            stroke="#00e5ff"
            stroke-width="13"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <!-- Right part of checkmark -->
      <line x1="-6" y1="35" x2="36" y2="-15"
            stroke="#00e5ff"
            stroke-width="13"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Strong glow effect for extra pop -->
  <defs>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark glow layer behind main shield -->
  <g filter="url(#strongGlow)">
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#0a0a0f"
          stroke-width="16"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.6"/>
  </g>

  <!-- Cyan glow layer -->
  <g filter="url(#strongGlow)">
    <path d="M 100 15 L 175 52 L 175 125 C 175 172 100 190 100 190 C 100 190 25 172 25 125 L 25 52 Z"
          fill="none"
          stroke="#00e5ff"
          stroke-width="10"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.4"/>
  </g>
</svg>