name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATEBUTLERTALKS }}" > /tmp/firebase-key.json
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json firebase deploy --project natebutlertalks
