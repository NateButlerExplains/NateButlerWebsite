name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Set up Firebase credentials
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATEBUTLERTALKS }}
        run: |
          mkdir -p ~/.config/gcloud
          echo "$FIREBASE_KEY" > ~/.config/gcloud/firebase-key.json
          echo "::add-mask::$FIREBASE_KEY"

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ~/.config/gcloud/firebase-key.json
        run: |
          npm install -g firebase-tools
          firebase --version
          firebase deploy --project natebutlertalks --debug
