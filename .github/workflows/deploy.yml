name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATEBUTLERTALKS }}" > /tmp/firebase-key.json
          echo "Checking firebase key file..."
          if [ -f /tmp/firebase-key.json ]; then
            echo "✓ Firebase key file created"
            echo "File size: $(wc -c < /tmp/firebase-key.json) bytes"
            head -c 50 /tmp/firebase-key.json
          else
            echo "✗ Firebase key file NOT found"
            exit 1
          fi
          npm install -g firebase-tools
          firebase deploy --project natebutlertalks
