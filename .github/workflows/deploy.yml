name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATEBUTLERTALKS }}" > /tmp/key.json
          cat /tmp/key.json | head -1
          firebase deploy --project natebutlertalks
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/key.json
